name: Deploy carver

on:
  push:
    branches: [main]
    paths: ['apps/carver/**', '.github/workflows/deploy-carver.yml']
  pull_request:
    paths: ['apps/carver/**', '.github/workflows/deploy-carver.yml']
  workflow_dispatch:

concurrency:
  group: deploy-carver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/carver -> apps/carver/target
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo install wasm-bindgen-cli --version 0.2.122 --locked
      - run: pnpm --filter carver build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: carver-dist
          path: apps/carver/dist
          retention-days: 1

  deploy:
    needs: [build]
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: carver-dist
          path: apps/carver/dist

      - name: Create Pages project (no-op if it already exists)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create carver-demo --production-branch=main

      - name: Deploy (production)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/carver/dist --project-name=carver-demo --branch=main --commit-hash=${{ github.sha }}

      - name: Validate preview branch name
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if ! printf '%s' "$HEAD_REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Refusing to deploy: branch name contains unexpected characters." >&2
            exit 1
          fi

      - name: Deploy (preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          HEAD_REF: ${{ github.head_ref }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/carver/dist --project-name=carver-demo --branch="$HEAD_REF" --commit-hash=${{ github.event.pull_request.head.sha }}
