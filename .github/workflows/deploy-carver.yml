name: Deploy carver

on:
  push:
    branches: [main]
    paths: ['apps/carver/**', '.github/workflows/deploy-carver.yml']
  pull_request:
    paths: ['apps/carver/**', '.github/workflows/deploy-carver.yml']
  workflow_dispatch:

concurrency:
  group: deploy-carver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/carver -> apps/carver/target
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cargo install wasm-bindgen-cli --version 0.2.122 --locked
      - run: pnpm --filter carver build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: carver-dist
          path: apps/carver/dist
          retention-days: 1

  deploy:
    needs: [build]
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: carver-dist
          path: apps/carver/dist

      - name: Create Pages project (no-op if it already exists)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create carver-demo --production-branch=main

      - name: Deploy (production)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/carver/dist --project-name=carver-demo --branch=main --commit-hash=${{ github.sha }}

      - name: Validate preview branch name
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if ! printf '%s' "$HEAD_REF" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
            echo "Refusing to deploy: branch name contains unexpected characters." >&2
            exit 1
          fi

      - name: Deploy (preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          HEAD_REF: ${{ github.head_ref }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/carver/dist --project-name=carver-demo --branch="$HEAD_REF" --commit-hash=${{ github.event.pull_request.head.sha }}
