# Keep SHA-pinned actions and npm deps fresh.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let a published version age before proposing it, and batch all action
    # bumps into ONE grouped PR instead of a separate PR per action.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
  - package-ecosystem: cargo
    directory: /apps/carver
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
