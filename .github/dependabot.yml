# Keep SHA-pinned actions and npm deps fresh.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7
  - package-ecosystem: cargo
    directory: /apps/carver
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
